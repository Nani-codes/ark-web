<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK Assured | The Seal of Trust</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ark-navy: #061226;
            --ark-gold: #D4AF37;
            --ark-gold-bright: #F1D382;
        }

        * {
            cursor: default;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
            /* Standardizing base font size */
        }

        @media (max-width: 768px) {
            html {
                font-size: 14px;
                /* Slightly smaller for mobile scaling */
            }
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--ark-navy);
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Premium Grain Overlay - Using CSS pattern instead of external image */
        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 255, 255, .03) 2px, rgba(255, 255, 255, .03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(255, 255, 255, .03) 2px, rgba(255, 255, 255, .03) 4px);
            background-size: 100% 100%;
        }

        /* Metallic Gold Text Effect */
        .text-metallic-gold {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--ark-navy);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--ark-gold);
            border-radius: 10px;
        }

        ::selection {
            background-color: var(--ark-gold);
            color: var(--ark-navy);
        }

        .bg-ark-gradient {
            background: radial-gradient(circle at top right, #0b1e3b 0%, #061226 100%);
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "framer-motion": "https://esm.sh/framer-motion@11.11.1?deps=react@18.3.1,react-dom@18.3.1",
    "lucide-react": "https://esm.sh/lucide-react@0.460.0?deps=react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/"
  }
}
</script>
    <link rel="stylesheet" href="/index.css">
    <script>
        // Optimize font loading
        if ('fonts' in document) {
            Promise.all([
                document.fonts.load('300 1em Inter'),
                document.fonts.load('400 1em Inter'),
                document.fonts.load('700 1em Inter'),
                document.fonts.load('900 1em Inter'),
                document.fonts.load('400 1em Playfair Display'),
            ]).catch(() => { });
        }
    </script>
</head>

<body>
    <div class="grain-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>

</html>
